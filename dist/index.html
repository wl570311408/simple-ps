<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/simple-ps/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">小学生小报排版工具</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1179186489438552"
      crossorigin="anonymous"></script>
    <script type="module" crossorigin src="/simple-ps/assets/index-DX7pahGu.js"></script>
    <link rel="stylesheet" crossorigin href="/simple-ps/assets/index-BUfMh_iU.css">
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function() {
        var isCtrlD = false
        
        document.addEventListener('keydown', function(e) {
          if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
            e.preventDefault()
            e.stopPropagation()
            isCtrlD = true
            setTimeout(function() {
              if (isCtrlD && window.handleCtrlD) {
                window.handleCtrlD()
              }
              isCtrlD = false
            }, 0)
            return false
          }
        }, true)
        
        document.addEventListener('keyup', function(e) {
          if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
            e.preventDefault()
            e.stopPropagation()
            return false
          }
        }, true)
      })()
    </script>
  </body>
</html>
